<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>NYC Heat Mapping</title>

  <!--ArcGIS widgets and map UI come with built in styling-->
  <link rel="stylesheet" href="https://js.arcgis.com/4.29/esri/themes/light/main.css" />

  <!-- Our CSS, meant to seperate the build in styling -->
   <!-- Sidebar width, layout, spacing, colors, map container-->
  <link rel="stylesheet" href="css/styles.css" />

  <!-- ArcGIS JS SDK Gives us access to classes we will use -->
  <script src="https://js.arcgis.com/4.34/"></script>

  <!-- Calcite Design System (required by ArcGIS Map Components) -->
  <script type="module" src="https://js.arcgis.com/calcite-components/3.3.3/calcite.esm.js"></script>

  <!-- ArcGIS Map Components (for Shadow Cast and Daylight web components) -->
  <script type="module" src="https://js.arcgis.com/4.34/map-components/"></script>
</head>

<body>

<div id="app">

  <!-- Sidebar Panel -->
  <div id="sidebar">
    <h2>NYC Heat Mapping</h2>

    <p>
      This tool helps visualize heat exposure, shade coverage, and public cooling
      resources across New York City.
    </p>

    <h3>Map Controls</h3>

    <button id="toggle3D">Toggle 2D / 3D</button>

    <!-- 3D Analysis Tools (only visible in 3D mode) -->
    <div id="tools-3d" class="tools-3d-hidden">
      <h3>3D Shadow Tools</h3>
      <p class="tools-3d-description">
        Choose a shadow analysis mode for the 3D view. Both tools use
        July 21 — the hottest day of the year on average in NYC.
      </p>
      <div class="tool-radio-group">
        <label class="tool-radio-row">
          <input type="radio" name="shadow-tool" value="shadow-cast" />
          <span class="tool-radio-label">
            <strong>Shadow Analysis</strong><br />
            <span class="tool-radio-detail">Cumulative shadow duration over the day. Darker areas receive more shade.</span>
          </span>
        </label>
        <label class="tool-radio-row">
          <input type="radio" name="shadow-tool" value="daylight" />
          <span class="tool-radio-label">
            <strong>Daylight Animation</strong><br />
            <span class="tool-radio-detail">Scrub or animate through the day to see shadows move in real time.</span>
          </span>
        </label>
        <label class="tool-radio-row">
          <input type="radio" name="shadow-tool" value="none" checked />
          <span class="tool-radio-label">
            <strong>None</strong><br />
            <span class="tool-radio-detail">3D view without shadow tools.</span>
          </span>
        </label>
      </div>
    </div>

  </div>

  <!-- Map Container -->
  <div id="viewDiv">
    <!-- Loading indicator (shown while view.updating is true) -->
    <div id="map-spinner"></div>
  </div>

</div>

<!-- App Logic -->
<script src="js/app.js"></script>

</body>
</html>
