<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>NYC Heat Mapping</title>

  <!--ArcGIS widgets and map UI come with built in styling-->
  <link rel="stylesheet" href="https://js.arcgis.com/4.29/esri/themes/light/main.css" />

  <!-- Our CSS, meant to seperate the build in styling -->
   <!-- Sidebar width, layout, spacing, colors, map container-->
  <link rel="stylesheet" href="css/styles.css" />

  <!-- ArcGIS JS SDK Gives us access to classes we will use -->
<script src="https://js.arcgis.com/4.29/"></script>
</head>

<body>

<div id="app">

  <!-- Sidebar Panel -->
  <div id="sidebar">
    <h2>NYC Heat Mapping</h2>

    <p>
      This tool helps visualize heat exposure, shade coverage, and public cooling
      resources across New York City.
    </p>

    <h3>Map Controls</h3>

    <button id="toggle3D">Toggle 2D / 3D</button>

    <h3>Basemap</h3>

    <select id="basemapSelect">
      <option value="streets-vector">Streets</option>
      <option value="satellite">Satellite</option>
    </select>

  </div>

  <!-- Map Container -->
  <div id="viewDiv"></div>

</div>

<!-- App Logic -->
<script src="js/app.js"></script>

</body>
</html>
